name: Build, Test, and Deploy to AWS

on:
  push:
    branches:
      - main
      - deploy-to-aws
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npm run check
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .svelte-kit/output/client
          retention-days: 1

  deploy-to-aws:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      AWS_REGION: us-east-1
      CDK_ENVIRONMENT: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Install CDK dependencies
        run: |
          cd infra
          npm install --legacy-peer-deps
          npm run build
          cd ..

      - name: Bootstrap CDK (if needed)
        run: |
          cd infra
          npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} --progress events || true
          cd ..

      - name: Deploy to AWS
        run: |
          cd infra
          npx cdk deploy SwyxkitFrontend-${{ env.CDK_ENVIRONMENT }} \
            --require-approval never \
            --progress events \
            --context environment=${{ env.CDK_ENVIRONMENT }} \
            --no-previous-parameters
          cd ..
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Get deployment outputs
        id: outputs
        run: |
          WEBSITE_URL=$(aws cloudformation describe-stacks \
            --stack-name SwyxkitFrontend-${{ env.CDK_ENVIRONMENT }} \
            --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }})

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name SwyxkitFrontend-${{ env.CDK_ENVIRONMENT }} \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "website_url=$WEBSITE_URL" >> $GITHUB_OUTPUT
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.distribution_id }} \
            --paths "/*" \
            --region ${{ env.AWS_REGION }}

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.CDK_ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Website URL:** ${{ steps.outputs.outputs.website_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Distribution ID:** ${{ steps.outputs.outputs.distribution_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    env:
      AWS_REGION: us-east-1
      CDK_ENVIRONMENT: preview-${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Install CDK dependencies
        run: |
          cd infra
          npm install --legacy-peer-deps
          npm run build
          cd ..

      - name: Bootstrap CDK (if needed)
        run: |
          cd infra
          npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} --progress events || true
          cd ..

      - name: Deploy preview to AWS
        run: |
          cd infra
          npx cdk deploy SwyxkitFrontend-${{ env.CDK_ENVIRONMENT }} \
            --require-approval never \
            --progress events \
            --context environment=${{ env.CDK_ENVIRONMENT }} \
            --hotswap-fallback
          cd ..
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Get preview deployment outputs
        id: preview-outputs
        run: |
          WEBSITE_URL=$(aws cloudformation describe-stacks \
            --stack-name SwyxkitFrontend-${{ env.CDK_ENVIRONMENT }} \
            --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "website_url=$WEBSITE_URL" >> $GITHUB_OUTPUT

      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deployment ✅\n\n🌐 **Preview URL:** ${{ steps.preview-outputs.outputs.website_url }}\n\n**Environment:** \`${{ env.CDK_ENVIRONMENT }}\`\n**Region:** \`${{ env.AWS_REGION }}\`\n\nThis preview deployment will be cleaned up after the PR is closed.`
            })
